name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Upload coverage to Codecov
        # Fork and Dependabot workflows cannot read repository secrets; tests still run.
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac  # v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: coverage.xml
          flags: backend
          fail_ci_if_error: true

      - name: Check for unused/missing dependencies
        run: deptry .

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Build Docker image
        run: docker build -t ssf-transmitter:ci .

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ssf-transmitter:ci
          format: cyclonedx
          output: sbom-cyclonedx.json
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json
          retention-days: 90

      # Print vulnerabilities in CI logs and fail on fixed HIGH/CRITICAL findings.
      - name: Scan image for HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ssf-transmitter:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache
