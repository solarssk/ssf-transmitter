name: CI

on:
  push:
    branches: ["main", "beta"]
  pull_request:

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required for SARIF upload to Security tab

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Build Docker image
        run: docker build -t ssf-transmitter:ci .

      # Scan for vulnerabilities — exit-code 0 means reporting only (does not block CI).
      # Findings are uploaded to the Security tab for triage. Once the base image
      # vulnerabilities are addressed, exit-code can be raised to "1".
      # --ignore-unfixed: skip CVEs with no available fix.
      - name: Scan image for HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ssf-transmitter:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Upload Trivy scan results to Security tab
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # SBOM generation reuses Trivy DB cached from the scan step above.
      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ssf-transmitter:ci
          format: cyclonedx
          output: sbom-cyclonedx.json
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json
          retention-days: 90
