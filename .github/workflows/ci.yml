name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Build Docker image
        run: docker build -t ssf-transmitter:ci .

      - name: Scan image for HIGH/CRITICAL vulnerabilities
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            ssf-transmitter:ci

      - name: Generate SBOM (CycloneDX)
        run: trivy image --format cyclonedx --output sbom-cyclonedx.json ssf-transmitter:ci

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom-cyclonedx
          path: sbom-cyclonedx.json
          retention-days: 90
