name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve release title from CHANGELOG
        id: meta
        run: |
          # Heading format: ## [X.Y.Z] — YYYY-MM-DD — Short release title
          version="${GITHUB_REF_NAME#v}"
          line="$(grep -m1 "^\## \[${version}\]" CHANGELOG.md || true)"
          subtitle="$(printf '%s\n' "$line" | sed -n 's/^## \[.*\] — [0-9-]* — \(.*\)$/\1/p')"
          if [ -n "$subtitle" ]; then
            echo "name=${GITHUB_REF_NAME} — ${subtitle}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release with auto-generated notes
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
